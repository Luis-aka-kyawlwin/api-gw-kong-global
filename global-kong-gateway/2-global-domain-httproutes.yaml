apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: retail-banking-global-httproute
  namespace: kong
spec:
  parentRefs:
    - name: global-kong-api-gateway
      namespace: kong
  hostnames:
    - "retail-banking.hellocloudbank.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: kong-retail-gateway-proxy
          namespace: retail-banking
          port: 80
---
